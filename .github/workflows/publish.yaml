# Bump version and publish when a new PR is merged
name: Publish crate

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Get latest tag
        id: latest
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          echo "tag=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Compute bumped version
        id: bump
        run: |
          VERSION=$(git cliff --bumped-version)
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Determine whether to release
        id: release
        run: |
          if [ "${{ steps.latest.outputs.tag }}" != "${{ steps.bump.outputs.version }}" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install cargo-edit
        if: steps.release.outputs.publish == 'true'
        run: cargo install cargo-edit --locked

      - name: Update Cargo.toml
        if: steps.release.outputs.publish == 'true'
        run: cargo set-version "${{ steps.bump.outputs.version }}"

      - name: Regenerate Cargo.lock
        if: steps.release.outputs.publish == 'true'
        run: cargo generate-lockfile

      - name: Generate CHANGELOG
        if: steps.release.outputs.publish == 'true'
        run: |
          git cliff \
            --tag "${{ steps.bump.outputs.version }}"

      - name: Commit and tag
        if: steps.release.outputs.publish == 'true'
        run: |
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Publish crate
        if: steps.release.outputs.created == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          cargo publish --verbose --no-verify --package nsga_rs
